name: Push
run-name: Push ${{ inputs.package }}

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENSE
      - Makefile
      - ".github/**"
      - ".vscode/**"
  workflow_dispatch:
    inputs:
      package:
        description: "Package"
        required: true
        default: all
        type: choice
        options:
          - csi-oci
          #
          - fluentd
          - ipsec
          - keydb
          - mongodb
          - mongosqld
          - mongosync
          - nginx-openresty
          - openvpn
          - pgbouncer
          - postgresql
          - iptables
          - reviewdog
          - skopeo
          - supercronic
          - tabix
          - tinyproxy
          - vals
          - wal-g
          - ytt
          # cicd
          - teamcity
          - github-actions-runner
          - all

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  packages:
    name: List packages
    runs-on: ubuntu-24.04
    outputs:
      packages: ${{ steps.package.outputs.packages || steps.filter.outputs.changes }}
    permissions:
      pull-requests: read
    steps:
      - name: Checkout
        if: ${{ inputs.package == 'all' || github.event_name != 'pull_request' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 5

      - name: Check changes
        if: ${{ inputs.package == 'all' || inputs.package == '' }}
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # make list | xargs -n1 | xargs -L 1 -I {} -R 2 echo "{}: [{}/**]" > .github/packages.yaml
          filters: .github/packages.yaml
          base: ${{ github.event_name != 'pull_request' && github.ref || '' }}
      - name: Set packages
        if: ${{ inputs.package != 'all' && inputs.package != '' }}
        id: package
        run: echo "packages=[\"${{ inputs.package }}\"]" >> "$GITHUB_OUTPUT"

  build-push:
    name: Release image
    timeout-minutes: 240
    needs: packages
    runs-on: Builder
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
        fail-fast: false
        max-parallel: 2
        matrix:
          pkg: ${{ fromJSON(needs.packages.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Set up QEMU
        timeout-minutes: 2
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64
      - name: Set up docker buildx
        timeout-minutes: 2
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Github registry login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - name: Build image
        timeout-minutes: 240
        run: make package-${{ matrix.pkg }}
        env:
          PUSH: "true"
      - name: Sign image
        timeout-minutes: 5
        run: make cosign-${{ matrix.pkg }}

      # - name: Clean old images
      #   uses: actions/delete-package-versions@v5
